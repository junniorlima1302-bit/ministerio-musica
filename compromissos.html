<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compromissos</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1b4580">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

 <style>
    @media (max-width: 600px) {

      .admin-box {
        padding: 18px 12px;
      }

      h2 { font-size: 20px; }

      /* Filtro de mês e botão resetar em coluna */
      .filtro-topo {
        flex-direction: column;
        align-items: stretch;
      }

      .filtro-topo select,
      .filtro-topo button {
        width: 100% !important;
        max-width: 100% !important;
      }

      /* Textarea maior para digitar */
      textarea {
        font-size: 15px;
        min-height: 120px;
      }

      /* Botões principais (Cadastrar, Limpar, Excluir) */
      button {
        font-size: 14px;
        padding: 11px;
        min-height: 42px;
      }

      /* Cabeçalho do grupo — título e botões em linha */
      .compromissos-page .linha-grupo-titulo {
        flex-direction: row;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        padding: 10px 12px;
      }

      .compromissos-page .linha-grupo-titulo h3 {
        font-size: 13px;
        text-align: left;
        flex: 1;
      }

      /* Botões Renomear e Adicionar compactos */
      .acoes-grupo {
        justify-content: flex-end;
        gap: 6px;
      }

      .btn-editar-grupo,
      .btn-adicionar-item {
        padding: 7px 10px;
        font-size: 12px;
        min-height: 34px;
        width: auto;
      }

      /* Item de compromisso — texto e botões em linha */
      .compromissos-page .item-compromisso {
        flex-direction: row;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
      }

      .compromissos-page .linha-compromisso {
        flex: 1;
      }

      .compromissos-page .linha-compromisso span {
        font-size: 13px;
        line-height: 1.4;
      }

      /* Botões Editar e Excluir compactos */
      .compromissos-page .acoes-item {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }

      .btn-editar-item,
      .btn-excluir-item {
        padding: 7px 10px;
        font-size: 12px;
        min-height: 34px;
        width: auto;
      }
    }
    .btn-toggle{
  width:auto;
  display:inline-block;
  background:#8e44ad;
  padding:10px 14px;
  margin-top:0;
  margin-bottom:12px;
}

  /* ── Drag & Drop para reordenar itens ── */
  .item-compromisso {
    transition: opacity 0.15s, transform 0.15s;
    position: relative;
  }
  .item-compromisso.dragging {
    opacity: 0.45;
    transform: scale(0.97);
    cursor: grabbing !important;
  }
  .item-compromisso.drag-over {
    border-top: 2px dashed #1b4580 !important;
  }
  .drag-handle {
    cursor: grab;
    color: #a0b8d0;
    font-size: 16px;
    padding: 0 6px 0 0;
    flex-shrink: 0;
    user-select: none;
    touch-action: none;
  }
  .drag-handle:active { cursor: grabbing; }

  /* ── Drag & Drop para reordenar GRUPOS ── */
  .grupo.dragging-grupo {
    opacity: 0.45;
    transform: scale(0.98);
    cursor: grabbing !important;
  }
  .grupo.drag-over-grupo {
    border-top: 2.5px dashed #8e44ad !important;
  }

  /* ── Botão excluir grupo completo ── */
  .btn-excluir-grupo {
    background: #c0392b;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    width: auto;
    margin: 0;
    min-height: 0;
    transition: background 0.15s;
  }
  .btn-excluir-grupo:hover { background: #a93226; }

  @media (max-width: 600px) {
    .btn-excluir-grupo {
      padding: 7px 10px;
      font-size: 12px;
      min-height: 34px;
    }
  }
  </style>
</head>

  <div class="admin-box">
    <h2>Compromissos do Mês</h2>

    <button class="btn-voltar" onclick="voltarPagina()">← Voltar</button>
    <button 
  id="btn-respostas"
  onclick="toggleRespostas()" 
  style="
    width:auto;
    display:inline-block;
    padding:6px 10px;
    margin-top:0;
    margin-bottom:12px;
    font-size:12px;
    border-radius:8px;
    border:none;
    color:white;
    cursor:pointer;
  "
>
  Carregando...
</button>
</button>
    <div class="filtro-topo" style="display:flex; gap:10px; align-items:center; margin-bottom:10px; flex-wrap:wrap; justify-content:center;">
      <select id="filtro-mes" onchange="carregarCompromissos()" style="height:36px; padding:0 10px; border-radius:8px; border:1px solid #ccc; font-size:13px;">
        <option value="todos">Todos os meses</option>
      </select>
      <button onclick="abrirPopupNotif()" style="width:auto; padding:0 14px; height:36px; margin-top:0; background:#e67e22; font-size:13px;">📣 Notificar</button>
    </div>

    <textarea id="entrada" placeholder="Digite os compromissos...

Use ENTER para separar
Use # para criar grupos

Exemplo:
# MISSAS DOMINICAIS
DIA 3 - MISSA
DIA 10 - MISSA"></textarea>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
      <button onclick="abrirPopupMes()" style="flex:1;min-width:0;margin:0;padding:10px 8px;font-size:13px;">Cadastrar</button>
      <button onclick="limparTudo()" style="flex:1;min-width:0;margin:0;padding:10px 8px;font-size:13px;background:#7f8c8d;">Limpar Tudo</button>
      <button onclick="excluirSelecionados()" style="flex:1;min-width:0;margin:0;padding:10px 8px;font-size:13px;background:#c0392b;">Excluir Selecionados</button>
    </div>

    <div id="lista-compromissos"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="app.js?v=2"></script>

  <script>
    // ── DRAG & DROP GRUPOS E ITENS ──
    let _dragGrupo = null;
    let _dragItem = null;
    let _dragItemOriginalGrupo = null;
    let _dragInitialized = false;
    let _touchGrupo = null;
    let _touchItem = null;
    let _touchClone = null;

    function iniciarDragDrop() {
      // Evita duplicar listeners
      if (_dragInitialized) return;
      _dragInitialized = true;

      const lista = document.getElementById('lista-compromissos');
      if (!lista) return;

      // ── DESKTOP: ativa draggable ao pressionar o handle ──
      lista.addEventListener('mousedown', e => {
        const handleGrupo = e.target.closest('.drag-handle-grupo');
        const handleItem = e.target.closest('.drag-handle');
        // Desativa draggable em tudo primeiro
        lista.querySelectorAll('.grupo, .item-compromisso').forEach(el => el.removeAttribute('draggable'));
        if (handleGrupo) {
          const grupo = handleGrupo.closest('.grupo');
          if (grupo) grupo.setAttribute('draggable', 'true');
        } else if (handleItem) {
          const item = handleItem.closest('.item-compromisso');
          if (item) item.setAttribute('draggable', 'true');
        }
      });

      lista.addEventListener('mouseup', e => {
        // Remove draggable após soltar para não interferir com cliques
        setTimeout(() => {
          lista.querySelectorAll('.grupo, .item-compromisso').forEach(el => el.removeAttribute('draggable'));
        }, 100);
      });

      // ── DESKTOP: drag events ──
      lista.addEventListener('dragstart', e => {
        const grupo = e.target.closest('.grupo[draggable="true"]');
        const item = e.target.closest('.item-compromisso[draggable="true"]');
        if (grupo && !item) {
          _dragGrupo = grupo;
          setTimeout(() => _dragGrupo?.classList.add('dragging-grupo'), 0);
          e.dataTransfer.effectAllowed = 'move';
        } else if (item) {
          _dragItem = item;
          _dragItemOriginalGrupo = _dragItem?.closest('.lista-itens');
          setTimeout(() => _dragItem?.classList.add('dragging'), 0);
          e.dataTransfer.effectAllowed = 'move';
        } else {
          e.preventDefault();
        }
      });

      lista.addEventListener('dragend', e => {
        if (_dragGrupo) {
          _dragGrupo.classList.remove('dragging-grupo');
          lista.querySelectorAll('.grupo').forEach(g => g.classList.remove('drag-over-grupo'));
          salvarOrdemCompleta();
          _dragGrupo = null;
        }
        if (_dragItem) {
          _dragItem.classList.remove('dragging');
          lista.querySelectorAll('.item-compromisso').forEach(i => i.classList.remove('drag-over'));
          salvarOrdemCompleta();
          _dragItem = null;
          _dragItemOriginalGrupo = null;
        }
      });

      lista.addEventListener('dragover', e => {
        e.preventDefault();
        if (_dragGrupo) {
          const alvoGrupo = e.target.closest('.grupo');
          if (!alvoGrupo || alvoGrupo === _dragGrupo) return;
          lista.querySelectorAll('.grupo').forEach(g => g.classList.remove('drag-over-grupo'));
          alvoGrupo.classList.add('drag-over-grupo');
          const rect = alvoGrupo.getBoundingClientRect();
          if (e.clientY < rect.top + rect.height / 2) {
            lista.insertBefore(_dragGrupo, alvoGrupo);
          } else {
            lista.insertBefore(_dragGrupo, alvoGrupo.nextSibling);
          }
        } else if (_dragItem) {
          const alvoItem = e.target.closest('.item-compromisso');
          const alvoLista = e.target.closest('.lista-itens');
          lista.querySelectorAll('.item-compromisso').forEach(i => i.classList.remove('drag-over'));
          if (alvoItem && alvoItem !== _dragItem) {
            alvoItem.classList.add('drag-over');
            const rect = alvoItem.getBoundingClientRect();
            if (e.clientY < rect.top + rect.height / 2) {
              alvoItem.parentNode.insertBefore(_dragItem, alvoItem);
            } else {
              alvoItem.parentNode.insertBefore(_dragItem, alvoItem.nextSibling);
            }
          } else if (alvoLista && !alvoLista.contains(_dragItem)) {
            alvoLista.appendChild(_dragItem);
          }
        }
      });

      // ── MOBILE: touch events ──
      lista.addEventListener('touchstart', e => {
        const handle = e.target.closest('.drag-handle-grupo');
        const itemHandle = e.target.closest('.drag-handle');
        if (handle) {
          _touchGrupo = handle.closest('.grupo');
          _touchGrupo.classList.add('dragging-grupo');
          e.preventDefault();
        } else if (itemHandle) {
          _touchItem = itemHandle.closest('.item-compromisso');
          _touchItem.classList.add('dragging');
          e.preventDefault();
        }
      }, { passive: false });

      lista.addEventListener('touchmove', e => {
        if (!_touchGrupo && !_touchItem) return;
        e.preventDefault();

        const touch = e.touches[0];

        // Esconde temporariamente o elemento arrastado para elementFromPoint funcionar
        if (_touchGrupo) _touchGrupo.style.visibility = 'hidden';
        if (_touchItem) _touchItem.style.visibility = 'hidden';

        const el = document.elementFromPoint(touch.clientX, touch.clientY);

        if (_touchGrupo) _touchGrupo.style.visibility = '';
        if (_touchItem) _touchItem.style.visibility = '';

        if (_touchGrupo) {
          const alvo = el?.closest('.grupo');
          if (alvo && alvo !== _touchGrupo) {
            const rect = alvo.getBoundingClientRect();
            if (touch.clientY < rect.top + rect.height / 2) {
              lista.insertBefore(_touchGrupo, alvo);
            } else {
              lista.insertBefore(_touchGrupo, alvo.nextSibling);
            }
          }
        } else if (_touchItem) {
          const alvo = el?.closest('.item-compromisso');
          const alvoLista = el?.closest('.lista-itens');
          if (alvo && alvo !== _touchItem) {
            const rect = alvo.getBoundingClientRect();
            if (touch.clientY < rect.top + rect.height / 2) {
              alvo.parentNode.insertBefore(_touchItem, alvo);
            } else {
              alvo.parentNode.insertBefore(_touchItem, alvo.nextSibling);
            }
          } else if (alvoLista && !alvoLista.contains(_touchItem)) {
            alvoLista.appendChild(_touchItem);
          }
        }
      }, { passive: false });

      lista.addEventListener('touchend', e => {
        if (_touchGrupo) {
          _touchGrupo.classList.remove('dragging-grupo');
          salvarOrdemCompleta();
          _touchGrupo = null;
        }
        if (_touchItem) {
          _touchItem.classList.remove('dragging');
          salvarOrdemCompleta();
          _touchItem = null;
        }
      });
    }

    // Sobrescreve carregarCompromissos para adicionar handles e iniciar drag
    const _origCarregarComp = window.carregarCompromissos;
    window.carregarCompromissos = async function(...args) {
      _dragInitialized = false; // Reseta para re-registrar listeners na nova lista
      await _origCarregarComp?.(...args);

      // Remove texto dos botões, deixa só ícones
      document.querySelectorAll('#lista-compromissos .btn-editar-item').forEach(b => b.textContent = '✏️');
      document.querySelectorAll('#lista-compromissos .btn-excluir-item').forEach(b => b.textContent = '🗑️');
      document.querySelectorAll('#lista-compromissos .btn-editar-grupo').forEach(b => b.textContent = '✏️');
      document.querySelectorAll('#lista-compromissos .btn-adicionar-item').forEach(b => b.textContent = '➕');
      document.querySelectorAll('#lista-compromissos .btn-excluir-grupo').forEach(b => b.textContent = '🗑️');

      // Adiciona handle nos grupos (draggable ativado só via mousedown)
      document.querySelectorAll('#lista-compromissos .grupo').forEach(g => {
        if (!g.querySelector('.drag-handle-grupo')) {
          const handle = document.createElement('span');
          handle.className = 'drag-handle-grupo';
          handle.title = 'Arrastar grupo';
          handle.textContent = '⠿';
          handle.style.cssText = 'cursor:grab;color:#a0b8d0;font-size:18px;padding:0 8px 0 0;flex-shrink:0;user-select:none;';
          const tituloLinha = g.querySelector('.linha-grupo-titulo');
          if (tituloLinha) tituloLinha.insertBefore(handle, tituloLinha.firstChild);
        }
      });

      // Adiciona handle nos itens (draggable ativado só via mousedown)
      document.querySelectorAll('#lista-compromissos .item-compromisso').forEach(item => {
        if (!item.querySelector('.drag-handle')) {
          const handle = document.createElement('span');
          handle.className = 'drag-handle';
          handle.title = 'Arrastar item';
          handle.textContent = '⠿';
          handle.style.cssText = 'cursor:grab;color:#a0b8d0;font-size:16px;padding:0 6px 0 0;flex-shrink:0;user-select:none;';
          item.insertBefore(handle, item.firstChild);
        }
      });

      iniciarDragDrop();
    };

    async function salvarOrdemCompleta() {
      const lista = document.getElementById('lista-compromissos');
      if (!lista) return;
      const grupos = [...lista.querySelectorAll('.grupo')];
      const updates = [];
      grupos.forEach((divGrupo, ordemGrupo) => {
        const itens = [...divGrupo.querySelectorAll('.item-compromisso')];
        itens.forEach((el, ordemItem) => {
          if (el.dataset.id) {
            updates.push({ id: el.dataset.id, ordem_grupo: ordemGrupo, ordem_item: ordemItem });
          }
        });
      });
      await Promise.all(
        updates.map(u =>
          supabase.from('compromissos').update({ ordem_grupo: u.ordem_grupo, ordem_item: u.ordem_item }).eq('id', u.id)
        )
      );
    }

    // Inicializa drag após carregarCompromissos
    const _origIniciarComp = window.iniciarCompromissos;

    let _membrosDestino = [];

    async function abrirPopupNotif() {
      // Carrega membros se ainda não carregou
      if (_membrosDestino.length === 0) {
        const { data } = await supabase
          .from('membros').select('id, nome, ministerio').eq('ativo', true).order('nome');
        _membrosDestino = data || [];
      }
      renderizarListaDest();
      document.getElementById('popup-notif-comp').classList.add('aberto');
    }

    function fecharPopupNotifComp() {
      document.getElementById('popup-notif-comp').classList.remove('aberto');
    }

    function renderizarListaDest() {
      const lista = document.getElementById('lista-dest-notif');
      lista.innerHTML = _membrosDestino.map(m => `
        <label class="dest-item">
          <input type="checkbox" class="chk-dest" value="${m.id}" onchange="atualizarCountDest()">
          <span class="dest-nome">${m.nome}</span>
          <span class="dest-min">${m.ministerio}</span>
        </label>
      `).join('');
      atualizarCountDest();
    }

    function atualizarCountDest() {
      const n = document.querySelectorAll('.chk-dest:checked').length;
      document.getElementById('count-dest').textContent = n;
    }

    function selecionarTodosDest() {
      document.querySelectorAll('.chk-dest').forEach(c => c.checked = true);
      atualizarCountDest();
    }

    function deselecionarTodosDest() {
      document.querySelectorAll('.chk-dest').forEach(c => c.checked = false);
      atualizarCountDest();
    }

    function selecionarMinDest(min) {
      document.querySelectorAll('.chk-dest').forEach(c => c.checked = false);
      _membrosDestino.forEach((m, i) => {
        if (m.ministerio === min) {
          document.querySelectorAll('.chk-dest')[i].checked = true;
        }
      });
      atualizarCountDest();
    }

    async function confirmarNotifComp() {
      const titulo = document.getElementById('notif-comp-titulo').value.trim();
      const corpo = document.getElementById('notif-comp-corpo').value.trim();
      if (!titulo || !corpo) { alert('Preencha o título e a mensagem.'); return; }

      const selecionados = [...document.querySelectorAll('.chk-dest:checked')].map(c => c.value);
      if (selecionados.length === 0) { alert('Selecione pelo menos um destinatário.'); return; }

      fecharPopupNotifComp();

      const result = await enviarPushTodos(titulo, corpo, selecionados);
      if (result?.enviados > 0) {
        alert(`✅ Notificação enviada para ${result.enviados} dispositivo(s)!`);
      } else if (result?.enviados === 0) {
        alert('⚠️ Nenhum dispositivo encontrado. Os membros precisam abrir o app e aceitar as notificações.');
      } else {
        alert('Erro ao enviar. Tente novamente.');
      }
    }
  </script>

</body>
</html>
