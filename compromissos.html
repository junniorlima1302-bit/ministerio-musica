<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compromissos</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1b4580">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

 <style>
    @media (max-width: 600px) {

      .admin-box {
        padding: 18px 12px;
      }

      h2 { font-size: 20px; }

      /* Filtro de mês e botão resetar em coluna */
      .filtro-topo {
        flex-direction: column;
        align-items: stretch;
      }

      .filtro-topo select,
      .filtro-topo button {
        width: 100% !important;
        max-width: 100% !important;
      }

      /* Textarea maior para digitar */
      textarea {
        font-size: 15px;
        min-height: 120px;
      }

      /* Botões principais (Cadastrar, Limpar, Excluir) */
      button {
        font-size: 14px;
        padding: 11px;
        min-height: 42px;
      }

      /* Cabeçalho do grupo — título e botões em linha */
      .compromissos-page .linha-grupo-titulo {
        flex-direction: row;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        padding: 10px 12px;
      }

      .compromissos-page .linha-grupo-titulo h3 {
        font-size: 13px;
        text-align: left;
        flex: 1;
      }

      /* Botões Renomear e Adicionar compactos */
      .acoes-grupo {
        justify-content: flex-end;
        gap: 6px;
      }

      .btn-editar-grupo,
      .btn-adicionar-item {
        padding: 7px 10px;
        font-size: 12px;
        min-height: 34px;
        width: auto;
      }

      /* Item de compromisso — texto e botões em linha */
      .compromissos-page .item-compromisso {
        flex-direction: row;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
      }

      .compromissos-page .linha-compromisso {
        flex: 1;
      }

      .compromissos-page .linha-compromisso span {
        font-size: 13px;
        line-height: 1.4;
      }

      /* Botões Editar e Excluir compactos */
      .compromissos-page .acoes-item {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }

      .btn-editar-item,
      .btn-excluir-item {
        padding: 7px 10px;
        font-size: 12px;
        min-height: 34px;
        width: auto;
      }
    }
    .btn-toggle{
  width:auto;
  display:inline-block;
  background:#8e44ad;
  padding:10px 14px;
  margin-top:0;
  margin-bottom:12px;
}
  </style>
</head>

<style>
  .popup-mes {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.45);
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }
  .popup-mes.aberto { display: flex; }

  .popup-mes .caixa {
    background: white;
    border-radius: 16px;
    padding: 28px 24px;
    width: 90%;
    max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    animation: popAnim 0.25s ease;
  }

  @keyframes popAnim {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .popup-mes h3 {
    font-size: 16px;
    color: #1a2e4a;
    margin-bottom: 16px;
    text-align: center;
  }

  .grade-meses {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .btn-mes {
    background: #eaf0f8;
    border: 1.5px solid #a0b8d0;
    border-radius: 10px;
    padding: 10px 6px;
    font-size: 13px;
    font-weight: 700;
    color: #1a2e4a;
    cursor: pointer;
    transition: 0.15s;
    text-align: center;
    width: 100%;
    margin-top: 0;
    min-height: 0;
  }

  .btn-mes:hover { background: #d0e0f0; border-color: #1b4580; }

  .btn-mes.selecionado {
    background: #1b4580;
    color: white;
    border-color: #1b4580;
  }

  .btn-mes.outro-ano {
    opacity: 0.55;
  }

  .popup-mes-acoes {
    display: flex;
    gap: 10px;
  }

  .popup-mes-acoes button {
    flex: 1;
    margin-top: 0;
    padding: 12px;
    font-size: 14px;
    border-radius: 10px;
  }

  .btn-confirmar-mes { background: #1b4580; color: white; }
  .btn-confirmar-mes:hover { background: #163b6d; }
  .btn-cancelar-mes { background: #e0e0e0; color: #333; }
  .btn-cancelar-mes:hover { background: #ccc; }

  .ano-label {
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    color: #7a9ec4;
    margin-bottom: 6px;
    margin-top: 4px;
    letter-spacing: 1px;
  }
</style>

<!-- POPUP NOTIFICAÇÃO -->
<style>
  .popup-notif {
    display: none; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%; background: rgba(0,0,0,0.5);
    justify-content: center; align-items: center; z-index: 99999; padding: 20px;
  }
  .popup-notif.aberto { display: flex; }
  .popup-notif .caixa {
    background: white; border-radius: 16px; padding: 24px 20px;
    width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    animation: popAnim 0.25s ease; max-height: 90vh; overflow-y: auto;
  }
  .popup-notif h3 { font-size: 16px; color: #1a2e4a; margin-bottom: 16px; text-align: center; }
  .popup-notif .campo-label {
    font-size: 11px; font-weight: 700; color: #5a7a9a;
    text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 6px;
  }
  .popup-notif input, .popup-notif textarea {
    width: 100%; border: 1.5px solid #a0b8d0; border-radius: 10px;
    padding: 10px 12px; font-size: 14px; font-family: inherit;
    color: #1a2e4a; margin-bottom: 12px; outline: none; box-sizing: border-box;
  }
  .popup-notif textarea { min-height: 70px; resize: vertical; }
  .popup-notif input:focus, .popup-notif textarea:focus { border-color: #1b4580; }
  .lista-dest {
    max-height: 200px; overflow-y: auto;
    border: 1.5px solid #a0b8d0; border-radius: 10px;
    margin-bottom: 12px; background: #f8fafd;
  }
  .dest-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-bottom: 1px solid #eaf0f8; cursor: pointer;
  }
  .dest-item:last-child { border-bottom: none; }
  .dest-item:hover { background: #eaf0f8; }
  .dest-item input[type=checkbox] {
    width: 16px; height: 16px; cursor: pointer;
    accent-color: #1b4580; margin: 0; display: inline; max-width: unset;
  }
  .dest-nome { font-size: 13px; font-weight: 600; color: #1a2e4a; flex: 1; }
  .dest-min { font-size: 11px; color: #7a9ec4; }
  .acoes-dest {
    display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
  }
  .btn-sel-dest {
    padding: 5px 12px; font-size: 12px; border-radius: 8px;
    background: #eaf0f8; color: #1a2e4a; border: 1px solid #a0b8d0;
    cursor: pointer; width: auto; margin: 0;
  }
  .btn-sel-dest:hover { background: #d0e0f0; }
  .popup-notif .acoes { display: flex; gap: 10px; margin-top: 4px; }
  .popup-notif .acoes button { flex: 1; margin-top: 0; padding: 12px; font-size: 14px; border-radius: 10px; }
  .btn-enviar-notif { background: #e67e22 !important; color: white !important; }
  .btn-cancelar-notif { background: #e0e0e0 !important; color: #333 !important; }
  .badge-count-dest {
    background: #1b4580; color: white; font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px; margin-left: 6px;
  }
</style>

<div id="popup-notif-comp" class="popup-notif">
  <div class="caixa">
    <h3>📣 Enviar Notificação</h3>
    <label class="campo-label">Título</label>
    <input type="text" id="notif-comp-titulo" maxlength="80" value="📅 Novas datas disponíveis!">
    <label class="campo-label">Mensagem</label>
    <textarea id="notif-comp-corpo" maxlength="200">Acesse o app e envie sua disponibilidade para o próximo mês.</textarea>
    <label class="campo-label">
      Destinatários <span class="badge-count-dest" id="count-dest">0</span>
    </label>
    <div class="acoes-dest">
      <button class="btn-sel-dest" onclick="selecionarTodosDest()">✅ Todos</button>
      <button class="btn-sel-dest" onclick="deselecionarTodosDest()">☐ Nenhum</button>
      <button class="btn-sel-dest" onclick="selecionarMinDest('Música Geral')">🎵 Música Geral</button>
      <button class="btn-sel-dest" onclick="selecionarMinDest('Geral Eventos')">🎙️ Geral Eventos</button>
    </div>
    <div class="lista-dest" id="lista-dest-notif">
      <div style="padding:14px;text-align:center;color:#7a9ec4;font-size:13px;">Carregando...</div>
    </div>
    <div class="acoes">
      <button class="btn-cancelar-notif" onclick="fecharPopupNotifComp()">Cancelar</button>
      <button class="btn-enviar-notif" onclick="confirmarNotifComp()">Enviar 📣</button>
    </div>
  </div>
</div>

<!-- POPUP SELEÇÃO DE MÊS -->
<div id="popup-mes-ref" class="popup-mes">
  <div class="caixa">
    <h3>📅 Para qual mês são esses compromissos?</h3>
    <div id="grade-meses-popup" class="grade-meses"></div>
    <div class="popup-mes-acoes">
      <button class="btn-cancelar-mes" onclick="fecharPopupMes()">Cancelar</button>
      <button class="btn-confirmar-mes" onclick="confirmarPopupMes()">Confirmar</button>
    </div>
  </div>
</div>

<body class="admin-page compromissos-page" onload="iniciarCompromissos(); atualizarBotaoRespostas()">

  <div class="admin-box">
    <h2>Compromissos do Mês</h2>

    <button class="btn-voltar" onclick="voltarPagina()">← Voltar</button>
    <button 
  id="btn-respostas"
  onclick="toggleRespostas()" 
  style="
    width:auto;
    display:inline-block;
    padding:6px 10px;
    margin-top:0;
    margin-bottom:12px;
    font-size:12px;
    border-radius:8px;
    border:none;
    color:white;
    cursor:pointer;
  "
>
  Carregando...
</button>
</button>
    <div class="filtro-topo" style="display:flex; gap:10px; align-items:center; margin-bottom:10px; flex-wrap:wrap; justify-content:center;">
      <select id="filtro-mes" onchange="carregarCompromissos()" style="height:36px; padding:0 10px; border-radius:8px; border:1px solid #ccc; font-size:13px;">
        <option value="todos">Todos os meses</option>
      </select>
      <button onclick="resetarMes()" style="width:auto; padding:0 14px; height:36px; margin-top:0; background:#c0392b; font-size:13px;">🗑️ Resetar mês</button>
      <button onclick="abrirPopupNotif()" style="width:auto; padding:0 14px; height:36px; margin-top:0; background:#e67e22; font-size:13px;">📣 Notificar</button>
    </div>

    <textarea id="entrada" placeholder="Digite os compromissos...

Use ENTER para separar
Use # para criar grupos

Exemplo:
# MISSAS DOMINICAIS
DIA 3 - MISSA
DIA 10 - MISSA"></textarea>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
      <button onclick="abrirPopupMes()" style="flex:1;min-width:0;margin:0;padding:10px 8px;font-size:13px;">Cadastrar</button>
      <button onclick="limparTudo()" style="flex:1;min-width:0;margin:0;padding:10px 8px;font-size:13px;background:#7f8c8d;">Limpar Tudo</button>
      <button onclick="excluirSelecionados()" style="flex:1;min-width:0;margin:0;padding:10px 8px;font-size:13px;background:#c0392b;">Excluir Selecionados</button>
    </div>

    <div id="lista-compromissos"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="app.js?v=2"></script>

  <script>
    let _membrosDestino = [];

    async function abrirPopupNotif() {
      // Carrega membros se ainda não carregou
      if (_membrosDestino.length === 0) {
        const { data } = await supabase
          .from('membros').select('id, nome, ministerio').eq('ativo', true).order('nome');
        _membrosDestino = data || [];
      }
      renderizarListaDest();
      document.getElementById('popup-notif-comp').classList.add('aberto');
    }

    function fecharPopupNotifComp() {
      document.getElementById('popup-notif-comp').classList.remove('aberto');
    }

    function renderizarListaDest() {
      const lista = document.getElementById('lista-dest-notif');
      lista.innerHTML = _membrosDestino.map(m => `
        <label class="dest-item">
          <input type="checkbox" class="chk-dest" value="${m.id}" onchange="atualizarCountDest()">
          <span class="dest-nome">${m.nome}</span>
          <span class="dest-min">${m.ministerio}</span>
        </label>
      `).join('');
      atualizarCountDest();
    }

    function atualizarCountDest() {
      const n = document.querySelectorAll('.chk-dest:checked').length;
      document.getElementById('count-dest').textContent = n;
    }

    function selecionarTodosDest() {
      document.querySelectorAll('.chk-dest').forEach(c => c.checked = true);
      atualizarCountDest();
    }

    function deselecionarTodosDest() {
      document.querySelectorAll('.chk-dest').forEach(c => c.checked = false);
      atualizarCountDest();
    }

    function selecionarMinDest(min) {
      document.querySelectorAll('.chk-dest').forEach(c => c.checked = false);
      _membrosDestino.forEach((m, i) => {
        if (m.ministerio === min) {
          document.querySelectorAll('.chk-dest')[i].checked = true;
        }
      });
      atualizarCountDest();
    }

    async function confirmarNotifComp() {
      const titulo = document.getElementById('notif-comp-titulo').value.trim();
      const corpo = document.getElementById('notif-comp-corpo').value.trim();
      if (!titulo || !corpo) { alert('Preencha o título e a mensagem.'); return; }

      const selecionados = [...document.querySelectorAll('.chk-dest:checked')].map(c => c.value);
      if (selecionados.length === 0) { alert('Selecione pelo menos um destinatário.'); return; }

      fecharPopupNotifComp();

      const result = await enviarPushTodos(titulo, corpo, selecionados);
      if (result?.enviados > 0) {
        alert(`✅ Notificação enviada para ${result.enviados} dispositivo(s)!`);
      } else if (result?.enviados === 0) {
        alert('⚠️ Nenhum dispositivo encontrado. Os membros precisam abrir o app e aceitar as notificações.');
      } else {
        alert('Erro ao enviar. Tente novamente.');
      }
    }
  </script>

</body>
</html>
