<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Música Geral Fortaleza</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b4580">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f0fa 0%, #c5d8f0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      font-family: 'Nunito', sans-serif;
    }

    .topo {
      text-align: center;
      margin-bottom: 36px;
    }

    .topo h1 {
      font-size: 26px;
      font-weight: 800;
      color: #1a2e4a;
      letter-spacing: 1px;
    }

    .grade {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      width: 100%;
      max-width: 560px;
    }

    .bloco {
      background: white;
      border: 1.5px solid #a0b8d0;
      border-radius: 16px;
      padding: 22px 14px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(27,69,128,0.08);
    }

    .bloco:hover {
      background: #eaf0f8;
      border-color: #1b4580;
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(27,69,128,0.15);
    }

    .bloco:active { transform: translateY(0px); }

    .bloco .icone { font-size: 30px; line-height: 1; }

    .bloco .label {
      font-size: 12px;
      font-weight: 800;
      color: #1a2e4a;
      text-align: center;
      line-height: 1.3;
    }

    .bloco .desc {
      font-size: 10px;
      color: #3a5272;
      text-align: center;
      line-height: 1.4;
      font-weight: 600;
    }

    .rodape {
      margin-top: 28px;
      text-align: center;
    }

    .btn-coordenacao {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 22px;
      background: white;
      border: 1.5px solid #a0b8d0;
      border-radius: 30px;
      color: #1a2e4a;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(27,69,128,0.08);
    }

    .btn-coordenacao:hover {
      background: #eaf0f8;
      border-color: #1b4580;
      color: #1b4580;
    }

    @media (max-width: 420px) {
      .grade { gap: 10px; }
      .bloco { padding: 16px 8px 14px; }
      .bloco .icone { font-size: 26px; }
      .bloco .label { font-size: 11px; }
      .bloco .desc { display: none; }
      .topo h1 { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="topo">
    <h1>MÚSICA GERAL FORTALEZA</h1>
  </div>

  <div class="grade">
    <a class="bloco" onclick="irPara('identificacao.html')">
      <div class="icone">📅</div>
      <div class="label">Enviar Disponibilidade</div>
      <div class="desc">Informe sua disponibilidade</div>
    </a>

    <a class="bloco" onclick="irPara('escala.html')">
      <div class="icone">📋</div>
      <div class="label">Escala do Mês</div>
      <div class="desc">Acompanhe a escala do mês</div>
    </a>

    <a class="bloco" onclick="irPara('repertorios.html')">
      <div class="icone">🎼</div>
      <div class="label">Repertórios</div>
      <div class="desc">Repertórios do mês</div>
    </a>

    <a class="bloco" onclick="irPara('coral.html')">
      <div class="icone">🎙️</div>
      <div class="label">Coral Shalom</div>
      <div class="desc">Informações do coral</div>
    </a>

    <a class="bloco" onclick="irPara('https://docs.google.com/document/d/1hX3ecyEERk10W3Hm9lKSZL8ZLs9yFMC1ryTtMGrXVI8/edit?tab=t.0')">
      <div class="icone">🔗</div>
      <div class="label">Link Importante</div>
      <div class="desc">Documento com os links</div>
    </a>
  </div>

  <div class="rodape">
    <a class="btn-coordenacao" onclick="irPara('login.html')">
      🔐 Login Coordenação
    </a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>

</body>
</html>
