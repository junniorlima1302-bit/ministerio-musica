<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identificação</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1b4580">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f0fa 0%, #c5d8f0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      font-family: 'Nunito', sans-serif;
    }

    .topo {
      text-align: center;
      margin-bottom: 28px;
    }

    .topo h1 {
      font-size: 24px;
      font-weight: 800;
      color: #1a2e4a;
      letter-spacing: 1px;
    }

    .topo p {
      font-size: 13px;
      color: #3a5272;
      margin-top: 6px;
      font-weight: 600;
    }

    .card {
      background: #eaf0f8;
      border: 1px solid #c4d4e8;
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
    }

    .campo-label {
      font-size: 11px;
      font-weight: 700;
      color: #5a7a9a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      display: block;
    }

    /* ── SEARCHABLE SELECT ── */
    .select-busca-wrap {
      position: relative;
      width: 100%;
    }

    #input-select {
      width: 100%;
      padding: 16px 44px 16px 14px;
      border: 1.5px solid #a0b8d0;
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      color: #1a2e4a;
      background: white;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      display: block;
      max-width: 100%;
      margin: 0;
    }

    #input-select::placeholder { color: #a0b8d0; }

    #input-select:focus {
      border-color: #1b4580;
      box-shadow: 0 0 0 3px rgba(27,69,128,0.1);
    }

    .seta-select {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      transition: transform 0.2s;
    }

    .select-busca-wrap.aberto .seta-select {
      transform: translateY(-50%) rotate(180deg);
    }

    .dropdown-lista {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: white;
      border: 1.5px solid #a0b8d0;
      border-radius: 12px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 999;
      box-shadow: 0 8px 24px rgba(27,69,128,0.15);
    }

    .select-busca-wrap.aberto .dropdown-lista {
      display: block;
    }

    .dropdown-item {
      padding: 13px 16px;
      font-size: 15px;
      font-family: 'Nunito', sans-serif;
      color: #1a2e4a;
      cursor: pointer;
      border-bottom: 1px solid #eaf0f8;
      transition: background 0.15s;
    }

    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: #eaf0f8; }
    .dropdown-item.selecionado { background: #ddeaf8; font-weight: 700; }

    .dropdown-vazio {
      padding: 14px 16px;
      font-size: 14px;
      color: #a0b8d0;
      text-align: center;
    }

    .dropdown-lista::-webkit-scrollbar { width: 6px; }
    .dropdown-lista::-webkit-scrollbar-track { background: transparent; }
    .dropdown-lista::-webkit-scrollbar-thumb { background: #c4d4e8; border-radius: 4px; }

    /* ── BOTÃO ── */
    .btn-continuar {
      width: 100%;
      margin-top: 16px;
      padding: 16px;
      background: #1b4580;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-continuar:hover {
      background: #163b6d;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .btn-continuar:disabled {
      background: #a0b8d0;
      transform: none;
      box-shadow: none;
      cursor: default;
    }

    .loading-txt {
      text-align: center;
      color: #7a9ec4;
      font-size: 14px;
      padding: 10px 0;
    }

    .rodape {
      margin-top: 20px;
      text-align: center;
    }

    .btn-inicio {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 12px 28px;
      background: rgba(27,69,128,0.08);
      border: 1px solid #a0b8d0;
      border-radius: 30px;
      color: #1b4580;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      width: auto;
      margin-top: 0;
    }

    .btn-inicio:hover { background: white; border-color: #1b4580; }

    @media (max-width: 600px) {
      body { padding: 24px 14px; }
      .topo h1 { font-size: 20px; }
      .card { padding: 24px 18px; }
    }
  </style>
</head>
<body onload="verificarStatusRespostas()">

  <div class="topo">
    <h1>MÚSICA GERAL FORTALEZA</h1>
    <p>Envio de disponibilidade</p>
  </div>

  <div class="card">
    <label class="campo-label" for="input-select">Selecione seu nome</label>
    <div id="loading-nomes" class="loading-txt">Carregando...</div>

    <div class="select-busca-wrap" id="select-wrap" style="display:none;">
      <input
        type="text"
        id="input-select"
        placeholder="-- Selecione --"
        autocomplete="off"
        onclick="abrirDropdown()"
        onfocus="abrirDropdown()"
        oninput="filtrar()"
      >
      <span class="seta-select">
        <svg width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 1l5 5 5-5" stroke="#1b4580" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <div class="dropdown-lista" id="dropdown-lista"></div>
    </div>

    <button class="btn-continuar" id="btn-continuar" onclick="continuar()" disabled>Continuar →</button>
  </div>

  <div class="rodape">
    <button class="btn-inicio" onclick="window.location.href='index.html'">🏠 Início</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>

  <script>
    let membrosCarregados = [];
    let membroSelecionado = null;
    let dropdownAberto = false;

    async function carregarNomes() {
      const { data, error } = await supabase
        .from("membros")
        .select("*")
        .eq("ativo", true)
        .order("nome");

      document.getElementById("loading-nomes").style.display = "none";
      document.getElementById("select-wrap").style.display = "block";

      if (error || !data || data.length === 0) {
        document.getElementById("input-select").placeholder = "Nenhum membro cadastrado";
        return;
      }

      membrosCarregados = data;
      renderizarDropdown(data);
    }

    function renderizarDropdown(lista) {
      const dl = document.getElementById("dropdown-lista");
      if (lista.length === 0) {
        dl.innerHTML = `<div class="dropdown-vazio">Nenhum nome encontrado</div>`;
        return;
      }
      dl.innerHTML = lista.map(m => `
        <div
          class="dropdown-item${membroSelecionado && membroSelecionado.id === m.id ? ' selecionado' : ''}"
          onmousedown="selecionarMembro('${m.id}')"
        >${m.nome}</div>
      `).join("");
    }

    function abrirDropdown() {
      const wrap = document.getElementById("select-wrap");
      const input = document.getElementById("input-select");

      wrap.classList.add("aberto");
      dropdownAberto = true;
      input.removeAttribute("readonly");

      // Seleciona o texto para facilitar a digitação
      setTimeout(() => input.select(), 10);
      renderizarDropdown(membrosCarregados);
    }

    function fecharDropdown() {
      const wrap = document.getElementById("select-wrap");
      const input = document.getElementById("input-select");

      wrap.classList.remove("aberto");
      dropdownAberto = false;
      input.setAttribute("readonly", true);

      // Restaura nome selecionado (ou limpa)
      input.value = membroSelecionado ? membroSelecionado.nome : "";
    }

    function filtrar() {
      const termo = document.getElementById("input-select").value.trim().toLowerCase();
      const filtrados = termo
        ? membrosCarregados.filter(m => m.nome.toLowerCase().includes(termo))
        : membrosCarregados;
      renderizarDropdown(filtrados);
    }

    function selecionarMembro(id) {
      membroSelecionado = membrosCarregados.find(m => m.id === id);
      document.getElementById("input-select").value = membroSelecionado.nome;
      document.getElementById("btn-continuar").disabled = false;
      fecharDropdown();
    }

    async function continuar() {
      if (!membroSelecionado) return;

      localStorage.setItem("nome", membroSelecionado.nome);
      localStorage.setItem("ministerio", membroSelecionado.ministerio);
      localStorage.setItem("tipo", membroSelecionado.tipo);
      localStorage.setItem("instrumento", membroSelecionado.instrumento || "");
      localStorage.setItem("ministro_id", membroSelecionado.id);

      // Vincula o token push ao membro (silencioso, só se já tem permissão)
      if (Notification.permission === 'granted') {
        registrarPush(membroSelecionado.id).catch(() => {});
      }

      let historico = JSON.parse(localStorage.getItem("historico")) || [];
      historico.push(window.location.pathname);
      localStorage.setItem("historico", JSON.stringify(historico));

      window.location.href = "disponibilidade.html";
    }

    // Fecha ao clicar fora
    document.addEventListener("click", function(e) {
      const wrap = document.getElementById("select-wrap");
      if (wrap && !wrap.contains(e.target) && dropdownAberto) {
        fecharDropdown();
      }
    });

    carregarNomes();
  </script>

</body>
</html>
