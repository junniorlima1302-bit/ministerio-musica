<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identificação</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1b4580">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    .radio-item { display: inline-block; margin: 5px; cursor: pointer; }
    .radio-item input[type="radio"] { display: none; }
    .radio-item span {
      display: block; padding: 12px 20px; border-radius: 10px;
      border: 2px solid #7a9ec4; background: #cfd8e8;
      color: #1a2e4a; font-size: 15px; font-weight: 500; transition: 0.2s;
    }
    .radio-item input:checked + span { background: #1b4580; color: white; border-color: #1b4580; }
    .radio-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    input[type="text"] { border: 1px solid #a0b8d0; background: rgba(255,255,255,0.75); color: #1a2e4a; font-size: 16px; }

    @media (max-width: 600px) {
      .admin-box {
        padding: 24px 16px;
      }
      .radio-item span {
        font-size: 15px;
        padding: 12px 18px;
      }
      input[type="text"] {
        max-width: 100%;
        font-size: 16px;
      }
      button {
        font-size: 16px;
        padding: 14px;
      }
    }
  </style>
</head>
<body class="admin-page">
  <div class="admin-box">
    <h2>Identificação</h2>
    <button class="btn-voltar" onclick="voltarPagina()">← Voltar</button>

    <input type="text" id="nome" placeholder="Seu nome">

    <h3>Selecione seu ministério:</h3>
    <div class="radio-group">
      <label class="radio-item">
        <input type="radio" name="ministerio" value="Música Geral">
        <span>Música Geral</span>
      </label>
      <label class="radio-item">
        <input type="radio" name="ministerio" value="Geral Eventos">
        <span>Geral Eventos</span>
      </label>
    </div>

    <h3>Como você participa?</h3>
    <div class="radio-group">
      <label class="radio-item">
        <input type="radio" name="tipo" value="canto" onchange="toggleInstrumento()">
        <span>Canto</span>
      </label>
      <label class="radio-item">
        <input type="radio" name="tipo" value="toco" onchange="toggleInstrumento()">
        <span>Toco</span>
      </label>
    </div>

    <div id="campo-instrumento" style="display:none; margin-top:10px;">
      <input type="text" id="instrumento" placeholder="Qual instrumento você toca?">
    </div>

    <button onclick="continuar()">Continuar</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
