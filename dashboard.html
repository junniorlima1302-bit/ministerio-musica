<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1b4580">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0f2a5e 0%, #1b4580 50%, #2d6bc4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      font-family: 'Nunito', sans-serif;
    }

    .topo {
      text-align: center;
      margin-bottom: 36px;
    }

    .topo h1 {
      font-size: 26px;
      font-weight: 800;
      color: white;
      letter-spacing: 1px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }

    .topo p {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 6px;
      font-weight: 400;
    }

    .grade {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      width: 100%;
      max-width: 560px;
    }

    .bloco {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 22px 14px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(6px);
      text-decoration: none;
    }

    .bloco:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .bloco:active { transform: translateY(0px); }

    .bloco .icone { font-size: 30px; line-height: 1; }

    .bloco .label {
      font-size: 12px;
      font-weight: 700;
      color: white;
      text-align: center;
      line-height: 1.3;
    }

    .bloco .desc {
      font-size: 10px;
      color: rgba(255,255,255,0.55);
      text-align: center;
      line-height: 1.4;
    }

    .rodape {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .btn-rodape {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 22px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 30px;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-rodape:hover {
      background: rgba(255,255,255,0.2);
      color: white;
      border-color: rgba(255,255,255,0.4);
    }

    .btn-sair {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      padding: 4px 12px;
      transition: 0.2s;
    }

    .btn-sair:hover { color: #ff6b6b; }

    @media (max-width: 420px) {
      .grade { gap: 10px; }
      .bloco { padding: 16px 8px 14px; }
      .bloco .icone { font-size: 26px; }
      .bloco .label { font-size: 11px; }
      .bloco .desc { display: none; }
      .topo h1 { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="topo">
    <h1>🎵 MÚSICA GERAL</h1>
    <p id="info-usuario">Carregando...</p>
  </div>

  <div id="area-botoes" style="display:none; width:100%; max-width:560px;">

    <div class="grade" id="grade-botoes">
      <a class="bloco" onclick="irPara('disponibilidades.html')">
        <div class="icone">📋</div>
        <div class="label">Ver Disponibilidades</div>
        <div class="desc">Respostas dos ministros</div>
      </a>
      <div id="area-admin" style="display:contents;"></div>
    </div>

    <div class="rodape">
      <a class="btn-rodape" onclick="window.location.href='index.html'">🏠 Voltar ao Início</a>
      <button class="btn-sair" onclick="fazerLogout()">Sair</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>

  <script>
    async function iniciarDashboard() {
      const { data: sessao } = await supabase.auth.getSession();

      if (!sessao.session) {
        const { data: refreshed } = await supabase.auth.refreshSession();
        if (!refreshed.session) {
          window.location.href = "login.html";
          return;
        }
      }

      const userId = sessao.session?.user?.id || (await supabase.auth.getSession()).data.session?.user?.id;

      const { data: usuario, error } = await supabase
        .from("usuarios")
        .select("*")
        .eq("id", userId)
        .single();

      if (error || !usuario) {
        alert("Usuário não encontrado. Contate o administrador.");
        await supabase.auth.signOut();
        window.location.href = "login.html";
        return;
      }

      document.getElementById("info-usuario").innerText = `Olá, ${usuario.nome}`;

      if (usuario.papel === "admin") {
        document.getElementById("area-admin").innerHTML = `
          <a class="bloco" onclick="irPara('justificativas.html')">
            <div class="icone">📝</div>
            <div class="label">Ver Justificativas</div>
            <div class="desc">Motivos das ausências</div>
          </a>
          <a class="bloco" onclick="irPara('compromissos.html')">
            <div class="icone">📅</div>
            <div class="label">Compromissos do Mês</div>
            <div class="desc">Gerencie os eventos</div>
          </a>
          <a class="bloco" onclick="irPara('usuarios.html')">
            <div class="icone">👥</div>
            <div class="label">Gerenciar Usuários</div>
            <div class="desc">Acesso e cadastros</div>
          </a>
        `;
      }

      document.getElementById("area-botoes").style.display = "block";
    }

    iniciarDashboard();
  </script>

</body>
</html>
