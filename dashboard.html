<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1b4580">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>

  <div class="container">
    <h2>Painel da Coordenação</h2>
    <p id="info-usuario" style="text-align:center; color:#1b4580; font-size:13px; margin-bottom:10px;"></p>

    <!-- Disponível para todos -->
    <button onclick="irPara('disponibilidades.html')">Ver Disponibilidades</button>

    <!-- Apenas admin -->
    <div id="area-admin" style="display:none;">
      <button onclick="irPara('justificativas.html')">Ver Justificativas</button>
      <button onclick="irPara('compromissos.html')">Compromissos do Mês</button>
      <button onclick="irPara('usuarios.html')">Gerenciar Usuários</button>
    </div>

    <button onclick="fazerLogout()" style="background:#c0392b; margin-top:20px;">Sair</button>
    <button class="btn-voltar" onclick="voltarPagina()">← Voltar</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>

  <script>
    async function iniciarDashboard() {
      const { data: sessao } = await supabase.auth.getSession();
      if (!sessao.session) {
        window.location.href = "login.html";
        return;
      }

      const userId = sessao.session.user.id;

      const { data: usuario, error } = await supabase
        .from("usuarios")
        .select("*")
        .eq("id", userId)
        .single();

      if (error || !usuario) {
        alert("Usuário não encontrado. Contate o administrador.");
        await supabase.auth.signOut();
        window.location.href = "login.html";
        return;
      }

      document.getElementById("info-usuario").innerText =
        `Olá, ${usuario.nome} (${usuario.papel})`;

      if (usuario.papel === "admin") {
        document.getElementById("area-admin").style.display = "block";
      }
    }

    iniciarDashboard();
  </script>

</body>
</html>
