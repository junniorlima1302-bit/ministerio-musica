<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1b4580">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f0fa 0%, #c5d8f0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      font-family: 'Nunito', sans-serif;
    }

    .topo {
      text-align: center;
      margin-bottom: 36px;
    }

    .topo h1 {
      font-size: 26px;
      font-weight: 800;
      color: #1a2e4a;
      letter-spacing: 1px;
    }

    .topo p {
      font-size: 13px;
      color: #3a5272;
      margin-top: 6px;
      font-weight: 600;
    }

    .grade {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      width: 100%;
      max-width: 760px;
    }

    .bloco {
      background: white;
      border: 1.5px solid #a0b8d0;
      border-radius: 16px;
      padding: 22px 14px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(27,69,128,0.08);
    }

    .bloco:hover {
      background: #eaf0f8;
      border-color: #1b4580;
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(27,69,128,0.15);
    }

    .bloco:active { transform: translateY(0px); }

    .bloco .icone { font-size: 36px; line-height: 1; }

    .bloco .label {
      font-size: 13px;
      font-weight: 800;
      color: #1a2e4a;
      text-align: center;
      line-height: 1.3;
    }

    .bloco .desc {
      font-size: 11px;
      color: #3a5272;
      text-align: center;
      line-height: 1.4;
      font-weight: 600;
    }

    .rodape {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .btn-rodape {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 12px 28px;
      background: white;
      border: 1.5px solid #a0b8d0;
      border-radius: 30px;
      color: #1a2e4a;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(27,69,128,0.08);
    }

    .btn-rodape:hover {
      background: #eaf0f8;
      border-color: #1b4580;
      color: #1b4580;
    }

    .btn-sair {
      background: none;
      border: none;
      color: #7a9ec4;
      font-size: 14px;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      padding: 4px 12px;
      transition: 0.2s;
    }

    .btn-sair:hover { color: #c0392b; background: none; }

    @media (max-width: 600px) {
      body { padding: 40px 16px; }
      .topo h1 { font-size: 22px; }
      .topo { margin-bottom: 28px; }
      .grade { gap: 12px; max-width: 100%; }
      .bloco { padding: 20px 10px 16px; border-radius: 14px; gap: 8px; }
      .bloco .icone { font-size: 34px; }
      .bloco .label { font-size: 13px; }
      .bloco .desc { font-size: 11px; }
      .btn-rodape { font-size: 14px; padding: 12px 24px; }
    }
  </style>
</head>
<body>

  <div class="topo">
    <h1>MÚSICA GERAL FORTALEZA</h1>
    <p id="info-usuario">Carregando...</p>
  </div>

  <div id="area-botoes" style="display:none; width:100%; max-width:760px;">

    <div class="grade" id="grade-botoes">
      <a class="bloco" onclick="irPara('disponibilidades.html')">
        <div class="icone">📋</div>
        <div class="label">Ver Disponibilidades</div>
        <div class="desc">Respostas dos ministros</div>
      </a>
      <div id="area-admin" style="display:contents;"></div>
    </div>

    <div class="rodape">
      <a class="btn-rodape" onclick="window.location.href='index.html'">🏠 Voltar ao Início</a>
      <button class="btn-sair" onclick="fazerLogout()">Sair</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>

  <script>
    async function iniciarDashboard() {
      const { data: sessao } = await supabase.auth.getSession();

      if (!sessao.session) {
        const { data: refreshed } = await supabase.auth.refreshSession();
        if (!refreshed.session) {
          window.location.href = "login.html";
          return;
        }
      }

      const userId = sessao.session?.user?.id || (await supabase.auth.getSession()).data.session?.user?.id;

      const { data: usuario, error } = await supabase
        .from("usuarios")
        .select("*")
        .eq("id", userId)
        .single();

      if (error || !usuario) {
        alert("Usuário não encontrado. Contate o administrador.");
        await supabase.auth.signOut();
        window.location.href = "login.html";
        return;
      }

      document.getElementById("info-usuario").innerText = `Olá, ${usuario.nome}`;

      if (usuario.papel === "admin") {
        document.getElementById("area-admin").innerHTML = `
          <a class="bloco" onclick="irPara('justificativas.html')">
            <div class="icone">📝</div>
            <div class="label">Ver Justificativas</div>
            <div class="desc">Motivos das ausências</div>
          </a>
          <a class="bloco" onclick="irPara('compromissos.html')">
            <div class="icone">📅</div>
            <div class="label">Compromissos do Mês</div>
            <div class="desc">Gerencie os eventos</div>
          </a>
          <a class="bloco" onclick="irPara('usuarios.html')">
            <div class="icone">⚙️</div>
            <div class="label">Gerenciar</div>
            <div class="desc">Usuários e ministros</div>
          </a>
          <a class="bloco" onclick="irPara('visibilidade.html')">
            <div class="icone">🎛️</div>
            <div class="label">Visibilidade</div>
            <div class="desc">Escalas e Repertórios</div>
          </a>
          <a class="bloco" onclick="irPara('notificacoes.html')">
            <div class="icone">🔔</div>
            <div class="label">Notificações</div>
            <div class="desc">Enviar para membros</div>
          </a>
        `;
      }

      document.getElementById("area-botoes").style.display = "block";
    }

    iniciarDashboard();
  </script>

</body>
</html>
