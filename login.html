<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1b4580">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f0fa 0%, #c5d8f0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      font-family: 'Nunito', sans-serif;
    }

    .topo {
      text-align: center;
      margin-bottom: 32px;
    }

    .topo h1 {
      font-size: 26px;
      font-weight: 800;
      color: #1a2e4a;
      letter-spacing: 1px;
    }

    .topo p {
      font-size: 13px;
      color: #5a7a9a;
      margin-top: 6px;
    }

    .card {
      background: #eaf0f8;
      border: 1px solid #c4d4e8;
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      max-width: 400px;
    }

    .campo { margin-bottom: 16px; }

    .campo label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #5a7a9a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 7px;
    }

    .campo input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.7);
      border: 1px solid #a0b8d0;
      border-radius: 10px;
      color: #1a2e4a;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      transition: 0.2s;
      outline: none;
      margin: 0;
      max-width: 100%;
      display: block;
    }

    .campo input::placeholder { color: #a0b8d0; }

    .campo input:focus {
      border-color: #7a9ec4;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 0 3px rgba(27,69,128,0.1);
    }

    .btn-entrar {
      width: 100%;
      padding: 16px;
      background: white;
      color: #1b4580;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.2s;
    }

    .btn-entrar:hover {
      background: #eef3fb;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .btn-esqueci {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: #7a9ec4;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      font-family: 'Nunito', sans-serif;
      transition: 0.2s;
      padding: 4px;
    }

    .btn-esqueci:hover { color: #1b4580; background: none; }

    .rodape {
      margin-top: 24px;
      text-align: center;
    }

    .btn-voltar {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 12px 28px;
      background: rgba(27,69,128,0.08);
      border: 1px solid #a0b8d0;
      border-radius: 30px;
      color: #1b4580;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-voltar:hover {
      background: rgba(255,255,255,0.4);
      color: #1a2e4a;
      border-color: #7a9ec4;
    }

    /* ===== CELULAR ===== */
    @media (max-width: 600px) {
      body { padding: 40px 16px; }

      .topo h1 { font-size: 22px; }
      .topo { margin-bottom: 24px; }

      .card {
        padding: 28px 20px;
        border-radius: 16px;
        max-width: 100%;
      }

      .campo input { padding: 15px 14px; }
      .btn-entrar { padding: 16px; font-size: 16px; }
    }
  </style>
</head>
<body>

  <div class="topo">
    <h1>MÚSICA GERAL FORTALEZA</h1>
    <p>Área restrita da coordenação</p>
  </div>

  <div class="card">
    <div class="campo">
      <label>Email</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>

    <div class="campo">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-entrar" onclick="fazerLogin()">Entrar</button>
    <button class="btn-esqueci" onclick="esqueceuSenha()">Esqueci minha senha</button>
  </div>

  <div class="rodape">
    <a class="btn-voltar" onclick="window.location.href='index.html'">🏠 Voltar ao Início</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>

  <script>
    async function verificarSessao() {
      const { data } = await supabase.auth.getSession();
      if (data.session) {
        window.location.href = "dashboard.html";
      }
    }
    verificarSessao();

    async function esqueceuSenha() {
      const email = document.getElementById("email").value.trim();
      if (!email) {
        alert("Digite seu email acima antes de clicar em esqueci minha senha.");
        return;
      }
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + "/login.html"
      });
      if (error) {
        alert("Erro ao enviar email: " + error.message);
        return;
      }
      alert("Email de redefinição enviado! Verifique sua caixa de entrada.");
    }
  </script>

</body>
</html>
