<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Disponibilidades</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="carregarRespostas()">

  <div class="container">
    <h2>Disponibilidades dos Ministros</h2>

    <button onclick="voltarPagina()">← Voltar</button>

    <div id="filtros">

      <select onchange="filtrarMinisterio(this.value)">
        <option value="todos">Todos Ministérios</option>
        <option value="Música Geral">Música Geral</option>
        <option value="Geral Eventos">Geral Eventos</option>
      </select>

      <select onchange="filtrarEvento(this.value)">
        <option value="todos">Todos Compromissos</option>
      </select>

      <input 
        type="text" 
        placeholder="Buscar por nome"
        oninput="filtrarPessoa(this.value)"
      >

    </div>

    <div id="lista-respostas"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>

</body>
</html>
