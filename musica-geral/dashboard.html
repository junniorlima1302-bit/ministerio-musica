<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1b4580">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>

  <div class="container">
    <h2>Painel da Coordenação</h2>

    <button onclick="irPara('compromissos.html')">
      Compromissos do Mês
    </button>
    <button onclick="irPara('disponibilidades.html')">
  Ver Disponibilidades
  <button class="btn-voltar" onclick="voltarPagina()">← Voltar</button>
</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>

  <script>
    async function verificarLogin() {
      const { data } = await supabase.auth.getSession();

      if (!data.session) {
        window.location.href = "login.html";
      }
    }

    verificarLogin();
  </script>

</body>
</html>
