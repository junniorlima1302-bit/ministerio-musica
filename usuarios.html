<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1b4580">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f0fa 0%, #c5d8f0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      font-family: 'Nunito', sans-serif;
    }

    .topo {
      text-align: center;
      margin-bottom: 32px;
    }

    .topo h1 {
      font-size: 22px;
      font-weight: 800;
      color: #1a2e4a;
      letter-spacing: 1px;
    }

    .grade {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      width: 100%;
      max-width: 480px;
    }

    .bloco {
      background: white;
      border: 1.5px solid #a0b8d0;
      border-radius: 16px;
      padding: 26px 14px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(27,69,128,0.08);
    }

    .bloco:hover {
      background: #eaf0f8;
      border-color: #1b4580;
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(27,69,128,0.15);
    }

    .bloco:active { transform: translateY(0px); }
    .bloco .icone { font-size: 38px; line-height: 1; }

    .bloco .label {
      font-size: 14px;
      font-weight: 800;
      color: #1a2e4a;
      text-align: center;
      line-height: 1.3;
    }

    .bloco .desc {
      font-size: 11px;
      color: #3a5272;
      text-align: center;
      line-height: 1.4;
      font-weight: 600;
    }

    .rodape {
      margin-top: 28px;
      text-align: center;
    }

    .btn-voltar-hub {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 12px 28px;
      background: white;
      border: 1.5px solid #a0b8d0;
      border-radius: 30px;
      color: #1a2e4a;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(27,69,128,0.08);
    }

    .btn-voltar-hub:hover { background: #eaf0f8; border-color: #1b4580; color: #1b4580; }

    @media (max-width: 600px) {
      body { padding: 32px 16px; }
      .topo h1 { font-size: 19px; }
      .topo { margin-bottom: 24px; }
      .grade { gap: 12px; max-width: 100%; }
      .bloco { padding: 22px 10px 18px; border-radius: 14px; }
      .bloco .icone { font-size: 34px; }
    }
  </style>
</head>
<body>

  <div class="topo">
    <h1>⚙️ Gerenciar</h1>
  </div>

  <div class="grade">
    <a class="bloco" onclick="irPara('usuarios-lista.html')">
      <div class="icone">👥</div>
      <div class="label">Usuários</div>
      <div class="desc">Cadastrados no sistema</div>
    </a>

    <a class="bloco" onclick="irPara('membros.html')">
      <div class="icone">🎵</div>
      <div class="label">Membros</div>
      <div class="desc">Cadastros e pendências</div>
    </a>

    <a class="bloco" onclick="irPara('usuarios-cadastro.html')">
      <div class="icone">➕</div>
      <div class="label">Cadastrar Usuário</div>
      <div class="desc">Novo acesso ao sistema</div>
    </a>

    <a class="bloco" onclick="irPara('minha-conta.html')">
      <div class="icone">🔑</div>
      <div class="label">Minha Conta</div>
      <div class="desc">Nome e senha</div>
    </a>
  </div>

  <div class="rodape">
    <button class="btn-voltar-hub" onclick="voltarPagina()">← Voltar</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>

  <script>
    async function iniciar() {
      const { data: sessao } = await supabase.auth.getSession();
      if (!sessao.session) { window.location.href = "login.html"; return; }

      const { data: eu } = await supabase
        .from("usuarios").select("papel").eq("id", sessao.session.user.id).single();

      if (!eu || eu.papel !== "admin") {
        alert("Acesso restrito ao administrador.");
        window.location.href = "dashboard.html";
        return;
      }
    }

    iniciar();
  </script>

</body>
</html>
