<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Redefinir Senha</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1b4580">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0f2a5e 0%, #1b4580 50%, #2d6bc4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      font-family: 'Nunito', sans-serif;
    }

    .topo {
      text-align: center;
      margin-bottom: 32px;
    }

    .topo h1 {
      font-size: 26px;
      font-weight: 800;
      color: white;
      letter-spacing: 1px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }

    .topo p {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 6px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
      backdrop-filter: blur(6px);
    }

    .campo {
      margin-bottom: 16px;
    }

    .campo label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 7px;
    }

    .campo input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-family: 'Nunito', sans-serif;
      transition: 0.2s;
      outline: none;
      margin: 0;
      max-width: 100%;
      display: block;
    }

    .campo input::placeholder { color: rgba(255,255,255,0.35); }

    .campo input:focus {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.18);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.08);
    }

    .btn-salvar {
      width: 100%;
      padding: 14px;
      background: white;
      color: #1b4580;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.2s;
    }

    .btn-salvar:hover {
      background: #eef3fb;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .msg-erro {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .rodape {
      margin-top: 24px;
      text-align: center;
    }

    .btn-voltar {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 22px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 30px;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-voltar:hover {
      background: rgba(255,255,255,0.2);
      color: white;
      border-color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>

  <div class="topo">
    <h1>MÚSICA GERAL FORTALEZA</h1>
    <p>Redefinição de senha</p>
  </div>

  <div class="card">
    <div class="campo">
      <label>Nova Senha</label>
      <input type="password" id="nova-senha" placeholder="••••••••">
    </div>

    <div class="campo">
      <label>Confirmar Nova Senha</label>
      <input type="password" id="confirmar-senha" placeholder="••••••••">
    </div>

    <button class="btn-salvar" onclick="redefinirSenha()">Salvar Nova Senha</button>
    <p class="msg-erro" id="msg-erro"></p>
  </div>

  <div class="rodape">
    <a class="btn-voltar" onclick="window.location.href='login.html'">← Voltar ao Login</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>

  <script>
    async function redefinirSenha() {
      const nova = document.getElementById("nova-senha").value;
      const confirmar = document.getElementById("confirmar-senha").value;
      const msgErro = document.getElementById("msg-erro");

      msgErro.style.display = "none";

      if (!nova || !confirmar) {
        msgErro.innerText = "Preencha os dois campos.";
        msgErro.style.display = "block";
        return;
      }

      if (nova !== confirmar) {
        msgErro.innerText = "As senhas não coincidem.";
        msgErro.style.display = "block";
        return;
      }

      if (nova.length < 6) {
        msgErro.innerText = "A senha deve ter pelo menos 6 caracteres.";
        msgErro.style.display = "block";
        return;
      }

      const { error } = await supabase.auth.updateUser({ password: nova });

      if (error) {
        msgErro.innerText = "Erro: " + error.message;
        msgErro.style.display = "block";
        return;
      }

      alert("Senha redefinida com sucesso!");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
