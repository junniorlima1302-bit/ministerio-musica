<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Escala</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1b4580">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; display: flex; flex-direction: column; background: #f0f2f5; font-family: Arial, sans-serif; }
    .topo {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      gap: 12px;
      flex-shrink: 0;
    }
    .topo h2 { color: #1b4580; font-size: 15px; flex: 1; text-align: center; margin: 0; }
    .topo button {
      width: auto; padding: 6px 14px; margin: 0;
      font-size: 13px; border-radius: 8px;
      background: none; color: #1b4580; border: none;
      cursor: pointer; font-weight: 600;
    }
    .topo button:hover { text-decoration: underline; background: none; }
    .iframe-wrap {
      flex: 1;
      overflow: hidden;
      -webkit-overflow-scrolling: touch;
      background: white;
      position: relative;
    }
    iframe {
      width: 100%;
      height: calc(100% + 30px);
      border: none;
      min-width: 600px;
      margin-top: -30px;
    }
    .iframe-loading {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #e8f0fa 0%, #c5d8f0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    .iframe-loading.oculto {
      opacity: 0;
      pointer-events: none;
    }
    .iframe-spinner {
      width: 38px;
      height: 38px;
      border: 3px solid #c4d4e8;
      border-top-color: #1b4580;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .iframe-loading p {
      font-size: 14px;
      font-weight: 600;
      color: #3a5272;
      animation: pulse-txt 1.4s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse-txt {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body class="iframe-page">
  <div class="topo">
    <button onclick="history.back()">← Voltar</button>
    <h2>Escala do Mês</h2>
    <div style="width:80px"></div>
  </div>
  <div class="iframe-wrap">
    <div class="iframe-loading" id="loading">
      <div class="iframe-spinner"></div>
      <p>Carregando escala...</p>
    </div>
    <iframe
      src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTagfHmQa28E6o31u3zpBc_PukU8TasS5EaB3nmcgPSB5yorbdvegDIqZhHUBkP586uSRWJNZiTKdJ3/pubhtml?widget=true&headers=false"
      onload="document.getElementById('loading').classList.add('oculto')">
    </iframe>
  </div>
</body>
</html>
